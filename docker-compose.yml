version: '3.8'

services:
  # The Backend Service
  backend:
    build: ./backend
    container_name: backend_server
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - app-network

  # The Frontend Service
  frontend:
    build: ./frontend
    container_name: frontend_server
    restart: unless-stopped
    networks:
      - app-network

  # The Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    ports:
      - "80:80"   # For HTTP
      - "443:443" # For HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile # Link to your Caddy config file
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
